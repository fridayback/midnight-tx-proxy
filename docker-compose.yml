version: '3.8'

services:
  midnight-tx-proxy:
    build: .
    container_name: midnight-tx-proxy
    ports:
      - "3000:3000"
    # 用户自定义的 .env 文件
    env_file:
      - ./.env
    volumes:
      # 配置文件（只读挂载）
      - ./config.json:/app/config/config.json:ro
      # 数据持久化
      - ./log:/app/log
      - ./wallet-snapshots:/app/wallet-snapshots
      - ./midnight-level-db:/app/midnight-level-db
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - CONFIG_PATH=/app/config/config.json
